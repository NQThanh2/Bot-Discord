name: Keep Render Alive

on:
  schedule:
    # Chạy mỗi 10 phút
    - cron: "*/10 * * * *"
  # Cho phép chạy thủ công từ tab Actions
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging at $(date -u)"
          curl -fsS --max-time 30 --retry 3 --retry-delay 10 \
            https://bot-discord-oaqx.onrender.com/health
          echo ""
          echo "Ping thành công"
